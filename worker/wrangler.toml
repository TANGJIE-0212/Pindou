name = "pindou-api"
main = "index.js"
compatibility_date = "2024-09-01"

# KV 命名空间 — 用于限流计数
# 部署前需要先创建 KV 命名空间，然后填入 id
# 命令: npx wrangler kv namespace create RATE_LIMIT
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "bee2c8446d474a52934bee6a700614f4"

# API 密钥通过 secret 设置，不写在这里
# 命令: npx wrangler secret put SF_API_KEY
# 然后粘贴你的 sk-xxxx 密钥
